<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var x=1;
        do{
            document.write(x+"<br>");
            x++;
        }
        while(x<=5);
         let j=5;
        do{
            document.write(j+"<br>");
            j--;
        }
        while(j>=1);
    </script>
    
</body>
</html>
