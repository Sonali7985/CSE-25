<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i=1;
        while(i<=5){
            document.write(i+"<br>");
            // document.write("<br>");
            i++;
        }
        let j=5;
        while(j>=1){
            document.write(j+"<br>");
            // document.write("<br>");
            j--;
        }
    </script>
    
</body>
</html>
